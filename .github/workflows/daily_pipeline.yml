name: Daily Data Pipeline

on:
  schedule:
    # Runs every day at 06:00 UTC (2pm MYT)
    - cron: "0 6 * * *"
  workflow_dispatch:    # Allow manual trigger from GitHub UI

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests pandas numpy python-dotenv loguru \
                      statsmodels scipy scikit-learn xgboost \
                      supabase psycopg2-binary sqlalchemy \
                      "dbt-postgres~=1.7.0"

      - name: Run data pipeline
        env:
          EIA_API_KEY:          ${{ secrets.EIA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
          SUPABASE_DB_HOST:      ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT:      ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_USER:      ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_NAME:      ${{ secrets.SUPABASE_DB_NAME }}
        run: |
          cd hormuz_watch
          if [ -n "$SUPABASE_DB_HOST" ] && [ ! -f dbt/profiles.yml ]; then
            cp dbt/profiles.yml.example dbt/profiles.yml
          fi
          python ingestion/run_pipeline.py

      - name: Commit updated data files
        run: |
          git config --global user.name  "HormuzWatch Bot"
          git config --global user.email "bot@hormuzwatch.com"
          git add data/raw/*.csv data/processed/*.csv data/processed/*.json
          git diff --staged --quiet || git commit -m "chore: daily data update $(date +'%Y-%m-%d')"
          git push
